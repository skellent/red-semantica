<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=2">
  <title>El Costo oculto  del Mal Uso del Celular</title>
  <link href="./src/styles.css" rel="stylesheet">
  <script src="./src/script.js" defer></script>
</head>

<body>
  <!-- Capas de Capas de Ambiente Aero HD -->
  <div class="sky-elements">
    <div class="sun-flare"></div>
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
  </div>
  <div class="tech-overlay"></div>
  <div class="light-streak"></div>

  <!-- Stickes Decorativos -->
  <div class="stickers-container">
    <div class="sticker computer"></div>
    <div class="sticker star-1"></div>
    <div class="sticker star-2"></div>
    <div class="sticker clover"></div>
    <div class="sticker folder"></div>
  </div>

  <!-- Orbes Frutiger 3D -->
  <div class="orbs-container">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="orb orb-5"></div>
  </div>

  <!-- Capa de Lluvia Frutiger (Burbujas y Hojas) -->
  <div class="falling-container">
    <!-- Hojas (20 items for high density) -->
    <div class="falling-item leaf leaf-1"></div>
    <div class="falling-item leaf leaf-2"></div>
    <div class="falling-item leaf leaf-3"></div>
    <div class="falling-item leaf leaf-4"></div>
    <div class="falling-item leaf leaf-5"></div>
    <div class="falling-item leaf leaf-6"></div>
    <div class="falling-item leaf leaf-7"></div>
    <div class="falling-item leaf leaf-8"></div>
    <div class="falling-item leaf leaf-9"></div>
    <div class="falling-item leaf leaf-10"></div>
    <div class="falling-item leaf leaf-11"></div>
    <div class="falling-item leaf leaf-12"></div>
    <div class="falling-item leaf leaf-13"></div>
    <div class="falling-item leaf leaf-14"></div>
    <div class="falling-item leaf leaf-15"></div>
    <div class="falling-item leaf leaf-16"></div>
    <div class="falling-item leaf leaf-17"></div>
    <div class="falling-item leaf leaf-18"></div>
    <div class="falling-item leaf leaf-19"></div>
    <div class="falling-item leaf leaf-20"></div>
    <!-- Burbujas -->
    <div class="falling-item bubble bubble-1"></div>
    <div class="falling-item bubble bubble-2"></div>
    <div class="falling-item bubble bubble-3"></div>
    <div class="falling-item bubble bubble-4"></div>
    <div class="falling-item bubble bubble-5"></div>
    <div class="falling-item bubble bubble-6"></div>
    <div class="falling-item bubble bubble-7"></div>
    <div class="falling-item bubble bubble-8"></div>
    <div class="falling-item bubble bubble-9"></div>
    <div class="falling-item bubble bubble-10"></div>
    <div class="falling-item bubble bubble-11"></div>
    <div class="falling-item bubble bubble-12"></div>
  </div>

  <h1>El Costo Oculto del Mal Uso del Celular</h1>
  <main id="contenedor-principal">
    <!-- Aqui se genera la info de la Red con JS 
      <article>
        <h3>Titulo</h3>
        <p></p>
        <img src="" alt="Imagen Representativa">
      </article>
      -->
  </main>

  <!-- Reproductor de Audio Frutiger -->
  <div class="audio-player-container">
    <audio id="ambient-audio" src="./WhatsApp Audio 2026-02-20 at 8.40.26 PM.mpeg" loop></audio>
    <button id="play-pause-btn" class="glass-btn" title="Reproducir música de ambiente">
      <span class="icon">▶</span>
    </button>
  </div>

  <footer>
    <!-- Aqui van los creditos -->
  </footer>
</body>

</html>
