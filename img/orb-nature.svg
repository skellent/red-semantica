<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="orbGrad" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="30%"  stop-color="#a8f0c0" stop-opacity="0.75"/>
      <stop offset="65%"  stop-color="#28c870" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0a6030" stop-opacity="0.30"/>
    </radialGradient>
    <radialGradient id="glossGrad" cx="40%" cy="25%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.00"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sombra suave -->
  <ellipse cx="100" cy="185" rx="60" ry="10" fill="rgba(0,100,40,0.18)"/>

  <!-- Esfera principal -->
  <circle cx="100" cy="100" r="90" fill="url(#orbGrad)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>

  <!-- Hoja interior -->
  <g filter="url(#glow)" transform="translate(100,105) rotate(-20)">
    <path d="M0,-45 C30,-30 40,10 0,45 C-40,10 -30,-30 0,-45 Z"
          fill="#3adb72" fill-opacity="0.85"/>
    <!-- nervio central -->
    <line x1="0" y1="-38" x2="0" y2="40" stroke="#1a8840" stroke-width="2" stroke-opacity="0.7"/>
    <!-- nervios secundarios -->
    <line x1="0" y1="-10" x2="20" y2="10"  stroke="#1a8840" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="0" y1="-10" x2="-20" y2="10" stroke="#1a8840" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="0" y1="10"  x2="22" y2="28"  stroke="#1a8840" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="0" y1="10"  x2="-22" y2="28" stroke="#1a8840" stroke-width="1" stroke-opacity="0.5"/>
  </g>

  <!-- Brillo gloss superior -->
  <ellipse cx="75" cy="65" rx="38" ry="22" fill="url(#glossGrad)"/>

  <!-- Aro exterior -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
</svg>
