<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="60%"  stop-color="#00d4ff" stop-opacity="0.0"/>
      <stop offset="85%"  stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="2.5"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Anillos concéntricos HUD -->
  <g filter="url(#glow)" opacity="0.85">
    <circle cx="150" cy="150" r="130" fill="none" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.5"/>
    <circle cx="150" cy="150" r="110" fill="none" stroke="#00e5ff" stroke-width="1.2" stroke-opacity="0.4"/>
    <circle cx="150" cy="150" r="90"  fill="none" stroke="#00e5ff" stroke-width="0.6" stroke-opacity="0.6"/>
    <circle cx="150" cy="150" r="70"  fill="none" stroke="#40ffcc" stroke-width="1.5" stroke-opacity="0.5"/>
  </g>

  <!-- Cruz de mira / retícula futurista -->
  <g stroke="#00e5ff" stroke-opacity="0.6" stroke-width="0.8">
    <line x1="150" y1="20"  x2="150" y2="80"  />
    <line x1="150" y1="220" x2="150" y2="280" />
    <line x1="20"  y1="150" x2="80"  y2="150" />
    <line x1="220" y1="150" x2="280" y2="150" />
  </g>

  <!-- Marcas de grados (cada 45°) -->
  <g stroke="#40ffcc" stroke-width="1.5" stroke-opacity="0.7">
    <line x1="150" y1="22" x2="150" y2="38"/>
    <line x1="150" y1="262" x2="150" y2="278"/>
    <line x1="22"  y1="150" x2="38"  y2="150"/>
    <line x1="262" y1="150" x2="278" y2="150"/>
    <!-- diagonales -->
    <line x1="58"  y1="58"  x2="68"  y2="68"  />
    <line x1="242" y1="58"  x2="232" y2="68"  />
    <line x1="58"  y1="242" x2="68"  y2="232" />
    <line x1="242" y1="242" x2="232" y2="232" />
  </g>

  <!-- Punto central brillante -->
  <circle cx="150" cy="150" r="5" fill="#00e5ff" filter="url(#glow)" opacity="0.9"/>
  <circle cx="150" cy="150" r="2" fill="#fff"/>

  <!-- Arco de carga futurista -->
  <path d="M 150 35 A 115 115 0 0 1 247 93" fill="none" stroke="#00ffcc" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.8"/>
  <path d="M 150 265 A 115 115 0 0 1 53  207" fill="none" stroke="#00ffcc" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.8"/>

  <!-- Texto HUD -->
  <text x="155" y="145" font-family="monospace" font-size="8" fill="#00e5ff" fill-opacity="0.7">SYS</text>
  <text x="155" y="158" font-family="monospace" font-size="6" fill="#40ffcc" fill-opacity="0.6">v2.0</text>
</svg>
